<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="360" viewBox="0 0 1280 360" role="img" aria-labelledby="title description">
  <title id="title">Gustavo Soto Aedo — Full-stack developer</title>
  <description id="description">Light-mode banner showing a workflow from business needs and operational rules through artificial intelligence, APIs, data, and delivered software.</description>
  <defs>
    <linearGradient id="background" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f8fbff"/>
      <stop offset="0.55" stop-color="#edf5ff"/>
      <stop offset="1" stop-color="#e5f0fb"/>
    </linearGradient>
    <radialGradient id="halo" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#2563eb" stop-opacity="0.14"/>
      <stop offset="1" stop-color="#2563eb" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M32 0H0V32" fill="none" stroke="#2563eb" stroke-opacity="0.08" stroke-width="1"/>
    </pattern>
    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <style>
    .flow { animation: dash 8s linear infinite; }
    .pulse { animation: pulse 3.2s ease-in-out infinite; transform-box: fill-box; transform-origin: center; }
    .pulse-delay { animation-delay: 1.1s; }
    @keyframes dash { to { stroke-dashoffset: -80; } }
    @keyframes pulse {
      0%, 100% { opacity: .62; transform: scale(.92); }
      50% { opacity: 1; transform: scale(1.08); }
    }
    @media (prefers-reduced-motion: reduce) {
      .flow, .pulse { animation: none; }
    }
  </style>

  <rect width="1280" height="360" rx="28" fill="url(#background)"/>
  <rect width="1280" height="360" rx="28" fill="url(#grid)"/>
  <ellipse cx="1000" cy="176" rx="350" ry="270" fill="url(#halo)"/>
  <path d="M0 312C290 278 416 346 699 314C929 288 1077 245 1280 266V360H0Z" fill="#dceafb" opacity="0.7"/>

  <g font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif">
    <rect x="72" y="53" width="250" height="34" rx="17" fill="#e2efff" stroke="#2563eb" stroke-opacity="0.45"/>
    <circle cx="92" cy="70" r="5" fill="#0f9f87" filter="url(#softGlow)"/>
    <text x="108" y="76" fill="#315b80" font-size="13" font-weight="700" letter-spacing="1.8">FULL-STACK DEVELOPER</text>

    <text x="70" y="157" fill="#14213d" font-size="55" font-weight="760" letter-spacing="-1.8">Gustavo Soto Aedo</text>
    <text x="72" y="205" fill="#2563eb" font-size="23" font-weight="620">AI-assisted workflows · Operational software</text>
    <text x="72" y="246" fill="#49647d" font-size="17">Turning complex work into clear, practical systems.</text>

    <g transform="translate(72 282)">
      <path d="M9 0C4 0 0 4 0 9c0 7 9 15 9 15s9-8 9-15c0-5-4-9-9-9Zm0 12.3A3.3 3.3 0 1 1 9 5.7a3.3 3.3 0 0 1 0 6.6Z" fill="#0f9f87"/>
      <text x="29" y="17" fill="#29445d" font-size="15" font-weight="600">Temuco, Chile</text>
      <circle cx="157" cy="10" r="2.5" fill="#2563eb"/>
      <text x="173" y="17" fill="#5e7790" font-size="15">github.com/gugasito</text>
    </g>
  </g>

  <g transform="translate(760 39)" font-family="Inter, ui-sans-serif, system-ui, sans-serif">
    <path class="flow" d="M170 57H235M320 99V190M235 232H170M85 190V99M150 99L255 190M255 99L150 190" fill="none" stroke="#2563eb" stroke-width="2" stroke-linecap="round" stroke-dasharray="8 12" opacity="0.4"/>

    <g transform="translate(0 15)">
      <rect width="170" height="84" rx="18" fill="#f8fbff" stroke="#9db9d3"/>
      <rect x="18" y="20" width="30" height="40" rx="4" fill="none" stroke="#2563eb" stroke-width="2"/>
      <path d="M26 32h14M26 41h14M26 50h10" stroke="#2563eb" stroke-width="2" stroke-linecap="round"/>
      <text x="60" y="40" fill="#14213d" font-size="11.5" font-weight="700">BUSINESS NEEDS</text>
      <text x="60" y="59" fill="#637e97" font-size="10.5">workflows + rules</text>
    </g>

    <g transform="translate(235 15)">
      <rect width="170" height="84" rx="18" fill="#f8fbff" stroke="#9db9d3"/>
      <circle class="pulse" cx="36" cy="42" r="19" fill="#dff7f2" stroke="#0f9f87" stroke-width="2"/>
      <path d="M28 42h16M36 34v16" stroke="#0f9f87" stroke-width="2" stroke-linecap="round"/>
      <text x="62" y="40" fill="#14213d" font-size="13" font-weight="700">AI + LOGIC</text>
      <text x="62" y="59" fill="#637e97" font-size="10.5">structured flow</text>
    </g>

    <g transform="translate(0 190)">
      <rect width="170" height="84" rx="18" fill="#f8fbff" stroke="#9db9d3"/>
      <path d="M20 29h28v27H20zM25 24h28v27" fill="none" stroke="#2563eb" stroke-width="2"/>
      <text x="62" y="40" fill="#14213d" font-size="13" font-weight="700">APIs + DATA</text>
      <text x="62" y="59" fill="#637e97" font-size="10.5">reliable services</text>
    </g>

    <g transform="translate(235 190)">
      <rect width="170" height="84" rx="18" fill="#f8fbff" stroke="#9db9d3"/>
      <circle class="pulse pulse-delay" cx="36" cy="42" r="19" fill="#fff3d2" stroke="#b7791f" stroke-width="2"/>
      <path d="m28 42 6 6 11-13" fill="none" stroke="#b7791f" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="62" y="40" fill="#14213d" font-size="13" font-weight="700">DELIVERY</text>
      <text x="62" y="59" fill="#637e97" font-size="10.5">usable software</text>
    </g>

    <g>
      <circle cx="202.5" cy="144.5" r="48" fill="#f8fbff" stroke="#2563eb" stroke-width="2"/>
      <circle cx="202.5" cy="144.5" r="38" fill="none" stroke="#0f9f87" stroke-dasharray="3 7" opacity="0.7"/>
      <text x="202.5" y="140.5" text-anchor="middle" fill="#14213d" font-size="12" font-weight="800" letter-spacing="1.8">BUILD</text>
      <text x="202.5" y="157.5" text-anchor="middle" fill="#2563eb" font-size="10" letter-spacing="1">END TO END</text>
    </g>
  </g>
</svg>
